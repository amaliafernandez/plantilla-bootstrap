<!DOCTYPE html>
<html lang="es" data-bs-theme="dark"> <!--para poner el tema a las webs -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Plantilla de componentes de bootstrap">
    <meta name="Author" content="Fernandez, Amalia">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/contactos.css">
    <title>Grilla</title>
</head>
<body>
<header>
    <nav class="navbar navbar-expand-lg bg-warning">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Plantilla de Bootstrap</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#opcionesMenu" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="opcionesMenu">
                <ul class="navbar-nav ms-auto mb-3 mb-lg-0">
                    <li class="nav-item ms-auto">
                        <a class="nav-link" aria-current="page" href="../index.html">Inicio</a>
                    </li>
                    <li class="nav-item ms-auto">
                        <a class="nav-link" href="./grilla.html">Grilla</a>
                    </li>
                    <li class="nav-item dropdown ms-auto">
                        <a class="nav-link  active" href="#">Contactos</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</header>
<main class="container my-5">
    <div class="py-5">
        <h1>Formulario con Stacks</h1>
    </div>
    <form class="row g-3 needs-validation border rounded-3 me-5 p-3" novalidate>
        <div class="col-12 col-md-6">
            <label for="validationCustom01" class="form-label">Nombre</label>
            <input type="text" class="form-control" id="validationCustom01" value="Ej:Juan" required>
            <div class="valid-feedback">
                Looks good!
            </div>
        </div>
        <div class="col-12 col-md-6 mb-3">
            <label for="formEmail" class="form-label">Email</label>
            <input type="email" class="form-control" id="formEmail" placeholder="test@ejemplo.com">
        </div>
        <div class="mb-3">
            <label for="form-mensaje" class="form-label">Mensaje</label>
            <textarea class="form-control" id="form-mensaje" rows="3"
                      placeholder="agrega aquí tu mensaje"></textarea>
        </div>
        <div class="form-check form-switch ms-2">
            <input class="form-check-input" type="checkbox" role="switch" id="switchCheckChecked" checked>
            <label class="form-check-label" for="switchCheckChecked">Aceptar términos (switch)</label>
        </div>
        <div class="col-12">
            <button class="btn btn-primary" type="submit">Enviar</button>
        </div>
    </form>
</main>
<footer class="text-center bg-dark-subtle py-3">
    <p>&copy;Derechos reservados 2026</p>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-w76AqPfDe2Z5OqAZzsPZTUZPLMy6bAbLnT3+J+FLGUicPqWZnq3p5GCJToK6P5sn"
        crossorigin="anonymous"></script>
</body>

</html>
